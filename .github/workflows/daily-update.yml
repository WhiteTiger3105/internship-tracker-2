name: Daily Internship Update

on:
  schedule:
    # Ruleaza zilnic la 06:00 UTC (~08:00/09:00 ora Romaniei, in functie de DST)
    - cron: '0 6 * * *'
  workflow_dispatch: {}   # permite si rulare manuala din tab-ul Actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Generate site
        run: python generate_site.py

      - name: Commit and push updated data + site
        run: |
          git config user.name "internship-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/results.json docs/index.html
          git diff --quiet --cached || git commit -m "Auto-update: $(date -u +'%Y-%m-%d')"
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (after update)
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
